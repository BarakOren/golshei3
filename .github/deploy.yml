name: Deploy React Site

on:
  push:
    branches: ["main"] # שנה ל-master אם זה שם הענף הראשי שלך

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # מתקין את ה-node_modules בצורה נקייה

      - name: Build site
        run: npm run build # מריץ את תהליך ה-Build של React

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # שים לב: אם האתר נבנה עם Vite, תיקיית הפלט היא 'dist'. 
          # אם הוא נבנה עם Create React App הישן, שנה כאן ל- 'build'
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4